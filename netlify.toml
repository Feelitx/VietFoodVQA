[build]
  # Provide the build command for your project
  command = "bun run build"
  
  # The directory containing your deployed assets
  # By default, Astro SSR outputs static assets to dist/client while server code goes to dist/server
  publish = "dist/client"

[context.production.environment]
  # Tell Netlify to use Bun
  BUN_VERSION = "1.0.0"
  NODE_VERSION = "22"
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  # Route API requests to the Astro SSR endpoint or Netlify Functions if configured
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
